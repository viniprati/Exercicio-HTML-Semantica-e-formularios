<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Vinicius Prati</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <strong>Vinicius Prati</strong>
            </div>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="../index.html#servicos">Serviços</a></li>
                <li><a href="./sobre.html">Sobre</a></li>
                <li><a href="./contato.html" class="cta-button">Fazer Orçamento</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contato">
            <h2>Vamos tirar seu projeto do papel?</h2>
            <p>Preencha o formulário ou me chame diretamente no Discord.</p>
            
            <form action="#" method="POST">
                <input type="text" name="nome" placeholder="Seu Nome" required>
                <input type="email" name="email" placeholder="Seu E-mail" required>
                <select name="servico">
                    <option value="web">Desenvolvimento Web</option>
                    <option value="bot">Bot para Discord</option>
                    <option value="outro">Outro</option>
                </select>
                <textarea name="mensagem" placeholder="Descreva seu projeto..."></textarea>
                <button type="submit" class="btn-submit">Enviar Proposta</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Vinicius Prati - Todos os direitos reservados.</p>
        <div class="social-links">
            <a href="https://github.com/viniprati">GitHub</a>

            <a href="https://discord.com/users/983870132063453235">Discord</a>
        </div>
    </footer>
</body>
